<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile AaBadCode</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <section class="hero">
            <div class="background">
                <header>
                    <div class="logo"><svg width="300" height="80" viewBox="0 0 300 80"
                        xmlns="http://www.w3.org/2000/svg">
                        <!-- Fundo transparente -->
                        <rect width="300" height="80" fill="transparent" />
                        
                        <!-- Texto AaBadCode -->
                        <text x="60" y="50" font-family="Monaco, monospace" font-size="32" fill="#FFFFFF"
                        font-weight="bold">
                        AaBadCode
                    </text>
                    
                    <!-- Ícone de bug à esquerda -->
                    <g transform="translate(10,20)">
                        <!-- Corpo do bug -->
                        <ellipse cx="15" cy="15" rx="15" ry="10" fill="#CCCCCC" />
                        <!-- Olhos -->
                        <circle cx="10" cy="12" r="2" fill="#000000" />
                        <circle cx="20" cy="12" r="2" fill="#000000" />
                        <!-- Pernas -->
                        <line x1="0" y1="15" x2="5" y2="15" stroke="#CCCCCC" stroke-width="2" />
                        <line x1="25" y1="15" x2="30" y2="15" stroke="#CCCCCC" stroke-width="2" />
                        <line x1="5" y1="5" x2="8" y2="0" stroke="#CCCCCC" stroke-width="2" />
                        <line x1="25" y1="5" x2="22" y2="0" stroke="#CCCCCC" stroke-width="2" />
                        <line x1="5" y1="25" x2="8" y2="30" stroke="#CCCCCC" stroke-width="2" />
                        <line x1="25" y1="25" x2="22" y2="30" stroke="#CCCCCC" stroke-width="2" />
                    </g>
                </svg></div>
                
            </header>
            <div class="content ">
                <h1>Welcome to <span>AaBadCode</span></h1>
                <small>@aabadcode Team@</small>
                <p class="text-zinc-500">
                    Let's know our website profile. Please choose a profile
                </p>
                <button class="profilebtn  border border-white bg-white/10 text-white backdrop-blur-ms hover:bg-white/5 hover:border-white transition duration-300 px-6 py-2 rounded">mmavungo</button>
                <button class="profilebtn  border border-white bg-white/10 text-white backdrop-blur-ms hover:bg-white/5 hover:border-white transition duration-300 px-6 py-2 rounded" >ggary</button>
  
            </div>
            </div>
    </section>
    <section class="profile bg-black" id="profile">
 
    </section>

    <section class="profile relative flex inset-x-4">
        <nav class="fixed top-1/2 -translate-y-1/2">
            <ul class="flex flex-col gap-6">
            <li id="home" class="icon" title="Home">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-house-icon lucide-house"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            </li>
            <li id="about" class="icon" title="About">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user-icon lucide-user"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </li>
            <li id="experience" class="icon" title="Experience">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-briefcase-icon lucide-briefcase"><path d="M16 20V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/><rect width="20" height="14" x="2" y="6" rx="2"/></svg>
            </li>
            <li id="contact" class="icon" title="Contact">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-link-icon lucide-link"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            </li>
            </ul>
        </nav>
    </section>
